<h2 class="sr-only">이전(α=0.10, β=1.0)과 신안(α=0.05, β=1.0) 두 시나리오를 4분면(ρ≥1, M≥median 기준)별로 비교하는 막대 차트. 시트 직접 계산 실측값 사용.</h2>
<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 8px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 12px; height: 12px; border-radius: 2px; background: #B4B2A9;"></span>이전 (α=0.10, β=1.0)</span>
  <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 12px; height: 12px; border-radius: 2px; background: #0F6E56;"></span>신안 (α=0.05, β=1.0)</span>
</div>
<div style="position: relative; width: 100%; height: 440px;">
  <canvas id="esgChartCorr" role="img" aria-label="Q1 고탄소-고노력 4사: 이전 +8.02, 신안 +5.03 (Δ -2.99). Q2 저탄소-고노력 20사: 이전 -19.03, 신안 -16.68 (Δ +2.35). Q3 저탄소-저노력 15사: 이전 +0.08, 신안 +2.39 (Δ +2.31). Q4 고탄소-저노력 8사: 이전 +9.20, 신안 +7.25 (Δ -1.95).">실측값 기준 시나리오 비교 차트</canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = ['Q1: 고탄소-고노력\n(4사)', 'Q2: 저탄소-고노력\n(20사)', 'Q3: 저탄소-저노력\n(15사)', 'Q4: 고탄소-저노력\n(8사)'];
const prev = [8.02, -19.03, 0.08, 9.20];
const next = [5.03, -16.68, 2.39, 7.25];
const deltas = [-2.99, 2.35, 2.31, -1.95];

const dataLabelPlugin = {
  id: 'dataLabel',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    ctx.save();
    ctx.font = '500 12px sans-serif';
    ctx.textAlign = 'center';
    chart.data.datasets.forEach((ds, di) => {
      const meta = chart.getDatasetMeta(di);
      meta.data.forEach((bar, i) => {
        const val = ds.data[i];
        const sign = val >= 0 ? '+' : '';
        const text = sign + val.toFixed(2) + '%p';
        ctx.fillStyle = ds.backgroundColor;
        const y = val >= 0 ? bar.y - 6 : bar.y + 16;
        ctx.textBaseline = val >= 0 ? 'bottom' : 'top';
        ctx.fillText(text, bar.x, y);
      });
    });
    ctx.restore();
  }
};

const deltaPlugin = {
  id: 'deltaLabel',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    ctx.save();
    ctx.font = '500 11px sans-serif';
    ctx.textAlign = 'center';
    const meta0 = chart.getDatasetMeta(0);
    const meta1 = chart.getDatasetMeta(1);
    meta0.data.forEach((bar0, i) => {
      const bar1 = meta1.data[i];
      const midX = (bar0.x + bar1.x) / 2;
      const d = deltas[i];
      const sign = d >= 0 ? '+' : '';
      const text = 'Δ ' + sign + d.toFixed(2);
      const color = d >= 0 ? '#A32D2D' : '#0F6E56';
      ctx.fillStyle = color;
      const baseY = chart.chartArea.bottom + 36;
      ctx.fillText(text, midX, baseY);
    });
    ctx.restore();
  }
};

new Chart(document.getElementById('esgChartCorr'), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      { label: '이전 (α=0.10, β=1.0)', data: prev, backgroundColor: '#B4B2A9', borderColor: '#5F5E5A', borderWidth: 0.5, categoryPercentage: 0.7, barPercentage: 0.85 },
      { label: '신안 (α=0.05, β=1.0)', data: next, backgroundColor: '#0F6E56', borderColor: '#04342C', borderWidth: 0.5, categoryPercentage: 0.7, barPercentage: 0.85 }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    layout: { padding: { top: 24, bottom: 48 } },
    plugins: {
      legend: { display: false },
      title: { display: true, text: "Chart 6''' — 이전 vs 신안 (시트 실측값, ρ≥1·M≥median 기준)", font: { size: 14, weight: '500' }, padding: { bottom: 12 } },
      tooltip: { callbacks: { label: (c) => c.dataset.label + ': ' + (c.parsed.y >= 0 ? '+' : '') + c.parsed.y.toFixed(2) + '%p' } }
    },
    scales: {
      y: {
        title: { display: true, text: '구버전 대비 보험료 변화 (%p)', font: { size: 12 } },
        min: -22, max: 12,
        grid: { color: 'rgba(128,128,128,0.15)' },
        ticks: { callback: (v) => v + '%p' }
      },
      x: { grid: { display: false }, ticks: { autoSkip: false, font: { size: 11 } } }
    }
  },
  plugins: [dataLabelPlugin, deltaPlugin]
});
</script>
